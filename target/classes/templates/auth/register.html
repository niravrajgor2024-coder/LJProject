<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>User Registration</title>
<!-- Bootstrap 5 CDN -->
<!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"> -->
<link href="/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
	<div
		class="container d-flex justify-content-center align-items-center min-vh-100">
		<div class="card shadow p-4" style="width: 100%; max-width: 400px;">
			<h2 class="text-center mb-4">User Registration</h2>
			<form th:action="@{/saveUser}" th:object="${user}" method="post">
				<div class="mb-3">
					<label class="form-label">Email</label> <input type="email"
						th:field="*{email}" class="form-control" />
					<div class="danger-text" th:if="${#fields.hasErrors('email')}"
						th:errors="*{email}"></div>
				</div>
				<div class="mb-3">
					<label class="form-label">User Name</label> <input type="text"
						th:field="*{user_name}" class="form-control" />
					<div class="danger-text" th:if="${#fields.hasErrors('user_name')}"
						th:errors="*{user_name}"></div>
				</div>
				<div class="mb-3">
					<label class="form-label">Password</label> <input type="password"
						th:field="*{password}" class="form-control" />
					<div class="danger-text" th:if="${#fields.hasErrors('password')}"
						th:errors="*{password}"></div>
				</div>
				<button type="submit" class="btn btn-primary w-100">
					Register</button>
			</form>
			<div class="text-center mt-3">
				<span>Login Here?</span> <a th:href="@{/login}">Login</a>
			</div>
		</div>
	</div>
</body>
</html>
